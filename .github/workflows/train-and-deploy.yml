name: Train Model and Deploy to Hugging Face

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Log in to Hugging Face
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        huggingface-cli login --token $HF_TOKEN
        
    - name: Create dummy data for training
      run: |
        mkdir -p data/train/cats data/train/dogs data/val/cats data/val/dogs
        # 创建一些虚拟图片用于演示（实际项目中应该使用真实数据）
        python -c "
        import os
        from PIL import Image
        import numpy as np
        
        # 创建训练数据
        for i in range(10):
            # 猫的图片（随机噪声）
            img = Image.fromarray(np.random.randint(0, 256, (224, 224, 3), dtype=np.uint8))
            img.save(f'data/train/cats/cat_{i}.jpg')
            
            # 狗的图片（不同随机噪声）
            img = Image.fromarray(np.random.randint(0, 256, (224, 224, 3), dtype=np.uint8))
            img.save(f'data/train/dogs/dog_{i}.jpg')
        
        # 创建验证数据
        for i in range(5):
            img = Image.fromarray(np.random.randint(0, 256, (224, 224, 3), dtype=np.uint8))
            img.save(f'data/val/cats/cat_{i}.jpg')
            img.save(f'data/val/dogs/dog_{i}.jpg')
        
        print('虚拟数据创建完成')
        "
        
    - name: Train model
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        HF_USERNAME: ${{ secrets.HF_USERNAME }}
        WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
      run: |
        python train.py
        
    - name: Upload model to Hugging Face
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        # 安装huggingface_hub
        pip install huggingface_hub
        
        # 使用huggingface-cli直接上传
        python -c "
        import os
        from huggingface_hub import HfApi, login, upload_file
        from pathlib import Path
        
        # 登录Hugging Face
        token = os.getenv('HF_TOKEN')
        login(token=token)
        
        # 创建仓库
        api = HfApi()
        try:
            repo_id = api.create_repo(
                repo_id='wzx952/cat-dog-classifier',
                token=token,
                repo_type='model',
                private=False,
                exist_ok=True
            )
            print('✅ 仓库创建成功')
        except Exception as e:
            print(f'仓库创建信息: {e}')
        
        # 上传模型文件
        try:
            upload_file(
                path_or_fileobj='best_model.pth',
                path_in_repo='best_model.pth',
                repo_id='wzx952/cat-dog-classifier',
                token=token,
                repo_type='model'
            )
            print('✅ 模型文件上传成功')
        except Exception as e:
            print(f'❌ 模型上传失败: {e}')
        
        # 创建README
        readme_content = '''---
license: mit
tags:
- pytorch
- image-classification
- cats-dogs
---

# Cat Dog Classifier

这是一个简单的猫狗分类模型，使用ResNet18架构训练。

## 模型信息
- 架构: ResNet18
- 输入: 224x224 RGB图像
- 输出: 猫/狗分类

## 使用方法
```python
import torch
from torchvision import transforms
from PIL import Image

# 加载模型
model = torch.load('best_model.pth')
model.eval()

# 预测
transform = transforms.Compose([
    transforms.Resize((224, 224)),
    transforms.ToTensor(),
    transforms.Normalize(mean=[0.485, 0.456, 0.406], std=[0.229, 0.224, 0.225])
])

image = Image.open('your_image.jpg')
input_tensor = transform(image).unsqueeze(0)
output = model(input_tensor)
predicted_class = 'cat' if output[0][0] > output[0][1] else 'dog'
print(f'预测结果: {predicted_class}')
```

## 训练信息
- 训练框架: PyTorch
- 训练环境: GitHub Actions
- 项目地址: https://github.com/Rhythmzd/ml-project-huggingface
'''
        
        try:
            upload_file(
                path_or_fileobj=readme_content.encode(),
                path_in_repo='README.md',
                repo_id='wzx952/cat-dog-classifier',
                token=token,
                repo_type='model'
            )
            print('✅ README上传成功')
        except Exception as e:
            print(f'❌ README上传失败: {e}')
        
        print('🎉 Hugging Face上传完成!')
        print('🔗 模型地址: https://huggingface.co/wxz952/cat-dog-classifier')
        "
        
    - name: Create model card
      env:
        HF_USERNAME: ${{ secrets.HF_USERNAME }}
      run: |
        cat > model_card.md << 'EOF'
        ---
        license: mit
        tags:
        - pytorch
        - image-classification
        - cats-dogs
        ---
        
        # Cat Dog Classifier
        
        这是一个简单的猫狗分类模型，使用ResNet18架构训练。
        
        ## 模型信息
        - 架构: ResNet18
        - 输入: 224x224 RGB图像
        - 输出: 猫/狗分类
        
        ## 使用方法
        ```python
        from transformers import AutoModelForImageClassification
        model = AutoModelForImageClassification.from_pretrained('${{ secrets.HF_USERNAME }}/cat-dog-classifier')
        ```
        
        ## 训练信息
        - 训练数据: 猫狗图像数据集
        - 训练环境: GitHub Actions
        - 框架: PyTorch
        EOF
        
        huggingface-cli upload ${{ secrets.HF_USERNAME }}/cat-dog-classifier model_card.md README.md --repo-type model
